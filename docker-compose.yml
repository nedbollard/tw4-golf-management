services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8084:80"
    volumes:
      - .:/var/www/html
      - tw4_sessions:/tmp   # Added persistent volume for PHP sessions
    depends_on:
      - db
    networks:
      - tw4-network
    environment:
      - DB_HOST=db
      - DB_NAME=TW4_base
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD}

  db:
    image: mysql:8.0
    restart: always
    environment:        
      MYSQL_DATABASE: TW4_base
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - tw4_data:/var/lib/mysql
    networks:
      - tw4-network

  phpmyadmin:
    image: phpmyadmin:latest
    restart: always
    ports:
      - "8085:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: ${DB_PASSWORD}
      PMA_ARBITRARY: 1
    depends_on:
      - db
    networks:
      - tw4-network

volumes:
  tw4_data:
  tw4_sessions:   # New volume for session storage

networks:
  tw4-network:
    driver: bridge
